# Spring 配置
spring:
  #应用名称
  application:
    name: 逝流

  #AI大模型
  ai:
    openai:
      api-key: sk-c2336cbabb9f427ca296d5e6ec68a450
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.5-35b-a3b

  #    deepseek:
  #      api-key: ${user-settings.api.deepseek_api_key}
  #      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  #      chat:
  #        options:
  #          model: deepseek-v3.2

  # 配置使用SQLite数据库
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:D:/Lyric/backend/Lyric/data/Lyric_dev.db

  # 配置文件上传大小限制
  servlet:
    multipart:
      max-file-size: 20480MB
      max-request-size: 102400MB
  
  # 配置额外的配置文件
  config:
    import: classpath:user-settings.yml

  # 配置Jackson日期时间格式
  Jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis 配置
mybatis:
  configuration:
    #自动映射下划线到驼峰命名
    map-underscore-to-camel-case: true