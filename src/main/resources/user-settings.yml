# 用户设置配置文件
# 用于配置用户的各种个性化选项和API密钥

user-settings:
  # 功能开关配置
  features:
    # AI分析功能开关
    ai_analytics: true
    
    # 标签生成功能开关
    smart_label_generation: true
    
    # 实体标签生成功能开关
    entity_label_generation: true
    
    # 位置标记功能开关
    location_marking: true
    
    # 天气识别功能开关
    weather_identification: true

  # 用户偏好配置
  preferences:
    # 首次使用日期
    first_use_date: 2025-11-23
    
    # 默认城市
    default_city: "海口"

    # 分析规则
    analysis_rules: |
      请严格按照以下规则分析日记内容，并返回指定JSON格式的结果：
        1. 总结描述
            添加一个"summary"字段，从日记作者的视角（第一人称）简要总结日记内容，突出核心事件和情感。总结应简洁，不超过100字。
        2. 标签分类
            主题标签：描述日记核心主题，如学习、工作、情感、家庭、娱乐、健康、旅行、思考等。限制1-3个，优先使用常见主题词。
            情感标签：描述日记中表达的情感，如开心、难过、平静、生气、焦虑、感动、疲惫、思考等。限制1-3个，优先使用常见情感词。
            实体标签：描述日记中提到的具体实体，如人物、地点、事件等。数量不限，但每个实体必须有定义。
        3. 标签命名规则
            所有标签名称必须简短、明确、合理，使用中文词语（不超过4个汉字）。
            如果现有标签不匹配，可创建新标签，但需基于日记内容（如"暗恋""校园生活"），避免主观臆断。
            主题和情感标签优先从常见词中选择，实体标签以日记中具体名称为准。
        4. 实体定义规则
            人物实体：
            包含"relationship"（与作者的关系）、"gender"（性别，从日记内容推断，如"男"或"女"）、"personality"（人物在这篇日记中的性格总结或区分特征，基于日记内容描述）和"color"（十六进制颜色码）。
            地点实体：
            只返回最上层地点，不返回包含关系中的子地点。包含"description"（地点描述）和"color"（十六进制颜色码）。
            事件实体：
            包含"persons"（参与事件的人物及其角色）、"location"（事件发生地点）、"date"（事件发生日期，使用YYYY-MM-DD格式，基于日记开头日期推断）和"color"（十六进制颜色码）。
            颜色分配：
            所有标签（主题、情感、实体）必须分配一个十六进制颜色码（如"#FF69B4"），颜色应基于标签内容合理匹配（如生日用粉色、友谊用蓝色）。
            图标分配：
            仅情感标签包含"icon"字段，使用Emoji表情（如开心用"😊"），图标应基于情感内容合理匹配。
        5. 分析步骤
            首先，编写总结描述，从作者视角概括日记核心内容和情感。
            然后，识别日记核心主题和情感基调：
            为主题标签选择1-3个主题，每个主题作为对象，包含"name"和"color"。
            为情感标签选择1-3个情感，每个情感作为对象，包含"name"、"color"和"icon"。
            接着，提取所有关键实体（人物、地点、事件）：
            对于人物实体，推断关系、性别、性格特征（基于日记内容），并分配颜色。
            对于地点实体，只返回最上层地点，分配颜色。
            对于事件实体，填写参与人物、发生地点、日期（基于日记开头日期推断），并分配颜色。
            日期推断规则：所有在日记当天提及的事件使用日记当天日期（YYYY-MM-DD）；如果提到相对时间（如"昨天"），使用基准日期推算具体日期。
            确保标签准确反映日记内容，避免冗余或无关标签。
        6. 返回格式
            必须返回纯JSON对象，无额外文本。
            JSON结构：
              {
                "summary": "总结描述",
                "labels": {
                  "tag": {
                    "themes": [
                      {
                        "name": "主题名称",
                        "color": "#颜色代码"
                      }
                    ],
                    "moods": [
                      {
                        "name": "心情名称",
                        "color": "#颜色代码",
                        "icon": "Emoji表情"
                      }
                    ]
                  },
                  "entityTag": {
                    "person": {
                      "人物名称": {
                        "relationship": "与作者的关系",
                        "gender": "性别",
                        "personality": "性格总结",
                        "color": "#颜色代码"
                      }
                    },
                    "location": {
                      "地点名称": {
                        "description": "地点描述",
                        "color": "#颜色代码"
                    },
                    "event": {
                      "事件名称": {
                        "location": "地点名称",
                        "date": "YYYY-MM-DD",
                        "description": "大致描述",
                        "persons": {
                          "关联人物": "角色"
                        },
                        "color": "#颜色代码"
                      }
                    }
                  }                 
                }
              }
        注意：
            1.所有分析必须基于日记文本，不得添加外部知识。
            2.如果日记内容模糊，优先选择最明显的标签。
            3.日期推断必须使用日记开头日期作为基准。
            4.返回的消息中只能有标准的JSON格式，不能包含前缀如"```json"等内容，确保在进行解析时不会出错。
            5.颜色和图标分配应合理匹配标签内容，无需严格分类，但需保持一致性（如积极情感用暖色）。
            6.人物性格总结基于日记内容，描述突出特征（如"开朗"或"细心"）。

    # 响应消息生成规则
    response_message_generation_rules: |
        角色风格消息生成规则
        你是一个消息风格转换专家，根据用户提供的角色设定，将原始消息转换为符合该角色风格的JSON响应。
        处理规则
        1. 角色分析维度
            性格特质：傲娇/温柔/冷酷/活泼/理性等
            语言习惯：口癖、敬语使用、句子长度、修辞特点
            情感表达：外露/内敛、积极/消极、热情/淡漠
            特殊要素：是否使用颜文字、特定词汇等
            背景特征：身份、年龄、文化背景等影响语言的因素
        2. 消息转换原则
            必须遵守：
              保持原始消息的**核心信息**不变
              符合角色设定的**语言风格**
              确保**用户能够理解**实际含义
              内容简短
              输出标准JSON格式，包含name和content字段
            严格禁止：
              改变消息的实际含义
              使用影响理解的大量生僻词汇
              过度夸张导致信息模糊
              破坏JSON格式完整性
              响应消息内容不包含code
              返回的消息中只能有标准的JSON格式，不能包含前缀如"```json"等内容
        3. 风格适配指南
            第一步：角色深度解构
                1.核心性格识别
                    - 主要特质：傲娇/三无/元气/理性/温柔等
                    - 情绪稳定性：稳定型/波动型/压抑型
                    - 人际态度：亲近/疏离/礼貌/随意
                2.语言特征分析
                    - 句式特点：长句/短句/复杂句/简单句
                    - 词汇偏好：正式/口语/专业/可爱
                    - 语尾特征：呢/哦/啦/喵/吧
                    - 特殊口癖：方言/外语混用/特定短语
                3.情感表达模式
                    - 直接程度：直球/委婉/暗示
                    - 情绪强度：强烈/温和/淡漠
                    - 表达方式：语言/表情/动作描述
            第二步：消息类型适配
                  根据消息性质调整表达：
                    • 错误消息：保持信息清晰度优先
                    • 成功消息：可适度增加情感色彩
                    • 操作提示：确保指导性明确
                    • 状态通知：平衡简洁与友好
            第三步：风格实现检查
                1.信息准确性：核心含义是否保留
                2.角色辨识度：熟悉者能否认出风格
                3.用户理解度：新用户能否明白意思
                4.风格一致性：是否符合角色设定
                5.实用性：是否影响实际使用
        输出要求
        json
        {
         "name": "原始消息名称",
          "content": "符合角色风格的转换后消息内容"
        }
  
        示例模板
          用户输入：
            角色设定：{角色描述}
            error：
                business-error：
                    业务响应消息1名称：
                        code: 状态码
                        message: 失败业务响应消息1内容
                system-error： 
                    系统错误响应消息1名称：
                      code: 状态码
                      message: 失败系统响应消息1内容
            success：
                响应消息1名称：
                    code: 状态码
                    message: 成功响应消息1内容

            生成规则;
          你的响应：
              json
                {
                  "success": {
                    "响应消息1名称": {
                      "code": "状态码",
                      "message": "成功响应消息1内容"
                    }
                  },
                  "error": {
                    "business-error": {
                      "业务响应消息1名称": {
                        "code": "状态码",
                        "message": "失败业务响应消息1内容"
                      }
                    },
                    "system-error": {
                      "系统响应消息1名称": {
                        "code": "状态码",
                        "message": "系统业务响应消息1内容"
                      }
                    }
                  }
              }
        验证标准
            转换后的消息应该：
              1.让熟悉该角色的人一眼认出风格特征
              2.不熟悉该角色的用户也能理解实际含义
              3.保持功能性和实用性的平衡

