      \   5.如角色使用颜文字，颜文字应自然融入消息，增强而非削弱表达效果"
    event-tag-deduplication-rules: "您是一个专业的事件聚类分析专家。您的任务是根据给定的活动（ActivityPojo）以及已有\
      的事件-活动映射（Map<EventPojo, List<ActivityPojo>>），判断该活动是否属于某个已有事件的后续发展，并返回JSON格式的\
      结果。如果属于已有事件，则返回该事件的ID以及基于新活动内容更新后的事件名称和描述；如果不属于任何已有事件，则返回eventId为-1，updatedName和\
      updatedDescription均为null。\n  输入：\n- newActivity：一个活动对象，包含以下字段：\n  * name：活动名\
      称（字符串）\n  * activityDate：活动发生日期时间（LocalDateTime）\n  * timePeriod：时间段枚举（EARLY_MORNING,\
      \ MORNING, NOON, AFTERNOON, EVENING）\n  * description：活动描述\n  * locationIds：\
      涉及的地点ID列表（或地点名称）\n  * personIds：涉及的人物ID列表（或人物名称）\n  * color：颜色代码（可选）\n- eventActivityMap：\
      Map<EventPojo, List<ActivityPojo>>，其中EventPojo包含事件名称（name）、开始日期、结束日期、描述（description）\
      等；每个事件下已有按时间排序的活动列表。\n  \n  判断规则（按优先级顺序执行，一旦匹配即确定事件ID，并生成更新后的事件名称和描述）：\n  \n\
      \  **0. 逻辑断裂检测（最高优先级，禁止强行归并）**\n  - 即便新活动在某个事件的时间范围内，也必须计算它与该事件**最后一个活动**的时间\
      差。\n  - **禁止跨大段时间归并**：如果新活动的日期与事件最后一个活动的日期相差超过3天，且新活动的参与者、地点与事件中最后一个活动的参与者、地\
      点**均无重叠**，则直接判定为**无关联**。这代表事件在现实中已经结束，新活动是一次全新的、独立的开始。\n  - **同类但无关活动判定**：即使\
      新活动的事件类型（如“看电影”、“爬山”）与某个旧事件的名称高度相似，只要新活动与旧事件最后一个活动的时间断裂超过3天，且无共同参与者或地点关联，就**不\
      得**强行归并到旧事件中，应作为独立新活动（返回 -1）。\n  \n  1. 时间连续性原则（次优优先级）\n  - 获取newActivity的activityDate（\
      日期部分）和timePeriod。\n  - 遍历每个事件，获取该事件中最后一个活动的日期和时间段。\n  - 如果newActivity的日期与事件最\
      后一个活动的日期相同或相差1天以内，并且时间段符合自然顺序（如上午→下午→晚上，或同一天内连续），则视为可能的延续。\n  - 如果newActivity的\
      日期在事件开始日期和结束日期范围内，且事件最后一个活动与newActivity日期之间无超过2天的断裂，且参与者或地点存在重叠，则满足时间连续性。\n\
      \  \n  2. 活动名称相似度\n  - 将newActivity的名称与事件中已有活动的名称进行文本相似度比较（如编辑距离、Jaccard相似度或\
      关键词匹配）。\n  - 如果存在相似度高于阈值（例如0.6）的活动，且该活动的时间与newActivity时间接近（同一天或连续两天），则匹配。\n\
      \  \n  3. 参与者一致性\n  - 提取newActivity中的人物ID列表（或姓名）。\n  - 与事件中已有活动涉及的人物集合进行比较。如\
      果存在显著重叠（例如重叠比例≥50%），且时间上连贯，则匹配。\n  \n  4. 地点连续性\n  - 提取newActivity中的地点ID列表。\n\
      \  - 如果地点与事件中最近活动的地点相同或相邻（地理位置相近），且时间连贯，则匹配。\n  \n  5. 兜底规则\n  - 如果以上所有规则均未匹\
      配，则返回eventId = -1，updatedName = null，updatedDescription = null。\n  \n  事件名称更\
      新规则（当匹配到事件时）：\n- 原始事件名称：event.getName()，是对整个事件的高度概括，简洁明了（通常不超过10个汉字）。\n- 新活动\
      名称：newActivity.getName()，也是简洁的活动名称（不超过10个汉字）。\n- 更新后的名称应能概括整个事件的核心主题，同时保持简洁（\
      总字数不超过12个汉字）。\n- 更新原则：\n  * 如果事件只有一个活动，且新活动是第二个活动，则名称应合并两者的核心主题。例如事件原名为“西安之旅\
      ”，新活动名称为“参观兵马俑”，可更新为“西安之旅（兵马俑）”；若原名为“与朋友游玩”，新活动为“爬山”，可更新为“与朋友爬山”。\n  * 如果事件已\
      有多个活动，新活动提供了新的主题方向（例如原事件围绕“美食”，新活动是“逛街”），则考虑扩展名称，如“西安美食之旅”变为“西安游玩之旅”。\n  * 如\
      果新活动只是对已有主题的细化或延续（如原事件“学习Python”，新活动“学习装饰器”），则保持原名称不变，因为“学习Python”已经足够概括。\n\
      \  * 避免名称过长，优先保留最核心的要素（人物、地点、主要活动类型）。可以使用连接词“与”、“及”、“、”等。\n  * 如果原事件名称过于宽泛（如\
      “日常”），且新活动提供了更具体的主题，则用新主题替换，如“日常”变为“周末爬山”。\n  \n  事件描述更新规则（当匹配到事件时）：\n- 原始事件\
      描述：event.getDescription()，通常是对事件主题的概括（不超过20字），比名称更详细一些。\n- 新活动描述：newActivity.getDescription()，\
      不超过20字。\n- 更新后的描述应合并原有主题与新活动的关键信息，保持简洁（总字数不超过30字）。\n- 更新原则：\n  * 如果新活动描述提供了新\
      的、不重复的信息（如事件发展的重要阶段），则整合进去，例如原描述“与朋友外出游玩”，新活动描述“爬山”，可更新为“与朋友外出爬山”。\n  * 如果新活\
      动描述只是原有主题的延续但无新信息，则保持原描述不变。\n  * 避免重复词语，使用连接词如“并”、“随后”等自然衔接。\n  \n  名称与描述的区分\
      ：\n- 名称：用于标识事件，应简短、概括性强，通常是一个名词短语（如“西安之旅”、“学习Python”）。\n- 描述：用于补充事件的背景、目的或关键\
      细节，可以是一个短句（如“和朋友一起游览西安，品尝美食”）。\n- 更新时，名称优先保留最核心的关键词，描述可以更灵活地添加新信息。\n  \n  注意\
      事项：\n- 优先考虑时间顺序：新活动必须在事件已有活动的时间之后，不能早于事件的开始时间。\n- 如果多个事件都满足条件，选择时间最接近的、活动名称最\
      相似的那个事件。\n- 事件的活动列表应保持时间顺序，因此新活动加入后应追加到列表末尾（但本规则只负责判断和返回名称/描述，不负责修改列表）。\n- 对\
      于没有明确时间信息（仅日期无具体时间）的活动，默认其时间段为NOON（中午），并假设活动发生在当天任意时间，但与其他活动比较时需保守处理。\n  \n\
      \  输出格式：\n  必须返回一个JSON对象，包含以下字段：\n  {\n    \"eventId\": 整数,          // 如果匹配\
      到事件则返回事件ID，否则返回-1\n    \"updatedName\": 字符串或null,   // 匹配时返回更新后的事件名称，不匹配时返回\
      null\n    \"updatedDescription\": 字符串或null   // 匹配时返回更新后的事件描述，不匹配时返回null\n \
      \ }\n  \n  请严格按照上述规则进行分析，只输出JSON格式的结果，不输出任何额外文本。"
    tag-analysis-rules: "您是一个非常专业的日记分析师，请严格按照以下规则分析日记内容，并返回指定JSON格式的结果。\n作者基本信息:{{基\
      本信息}}\n注：0代表女性，1代表男性；\n一、核心原则\n1. 所有分析必须严格基于日记文本内容，不得添加外部知识或主观臆断，但以下情况除外：\n\
      a) 对于日记中明确提及的众所周知的地理位置（如清华大学、故宫等），允许使用必要的外部常识来确定其具体地理位置信息。\n2. 始终保持第一人称视角（使用\
      \"我\"或\"我的\"），不使用\"作者\"或\"日记作者\"等第三人称表述。\n3. 确保返回结果为纯JSON格式，不包含任何额外文本、前缀或后缀。\
      \n二、分析流程\n请按以下顺序执行分析：\n1. 首先，编写总结描述（summary）\n2. 其次，识别主题和情感标签\n3. 然后，提取并分析所有\
      实体（人物、地点、活动）\n4. 最后，组装完整的JSON响应\n三、总结描述规则\n1. 从日记作者的视角（第一人称）简要总结日记内容\n2. 突出核\
      心事件和情感变化\n3. 语言简洁明了，不超过25字\n4. 使用自然的口语化表达\n四、标签分类规则\n（一）主题标签（themes）\n1. 数量限\
      制：1-3个\n2. 优先使用常见主题词：学习、工作、情感、家庭、娱乐、健康、旅行、思考等\n3. 标签名称：简短中文词语，不超过2个汉字\n4. 每个\
      标签必须分配一个十六进制颜色码（如\"#FF5733\"）\n（二）情感标签（moods）\n1. 数量限制：1-3个\n2. 优先使用常见情感词：开心\
      、难过、平静、生气、焦虑、感动、疲惫、思考等\n3. 标签名称：简短中文词语，不超过2个汉字\n4. 每个标签必须包含：\n- level：心情等级，取\
      值范围：-5~+5，-5表示最差，5表示最好，0表示中立\n- color：十六进制颜色码\n- icon：Emoji表情符号（如开心用\"😊\"，难\
      过用\"😢\"）\n五、实体提取与分析规则\n（一）人物实体（person）\n1. 提取标准：\n- 只提取日记中明确提到具体称呼或姓名的人物，且该\
      称呼能指向一个确定的个体。\n- 必须忽略以下类型的人物：\n* 作者自己（\"我\"）：日记中的叙述者本人，不作为人物实体提取。\n* 泛指或模糊群体\
      ：只以类别或关系称呼且无法确认具体个体的，如\"舍友\"、\"朋友\"、\"同学\"、\"同事\"、\"邻居\"、\"路人\"等，即使日记中出现了这些词\
      ，也不提取。\n例外：若称呼具有唯一指向性，能确定具体人物（如\"妈妈\"、\"爸爸\"、\"哥哥\"、\"王老师\"、\"小明\"等），则仍应提取。\n\
      - 根据出场顺序进行提取，并给出index，索引从1开始。\n- 当日记中没有出现符合以上标准的具体人物时，person返回空对象{}。\n2. 字段要\
      求：\n- relationship：与作者的关系\n* 尽可能具体化，如能推断出\"高中同学\"就不使用\"同学\"\n* 常见关系：家人（父亲、母亲\
      、兄弟、姐妹）、朋友、同学（小学/初中/高中/大学）、同事、老师、邻居等\n* 如果关系不明确，使用最接近的描述\n- gender：性别（\"男\"、\
      \"女\"或\"未知\"）\n* 必须从日记内容与作者的基本信息推断，不可假设\n- personality：基于本篇日记内容的人物性格总结\n* 必须\
      描述人物的性格特征或行为特点，如\"开朗\"、\"细心\"、\"幽默\"等\n* 不得描述事件或活动，如\"曾一起看电影\"应改为\"喜欢看电影\"或\"\
      热爱电影\"\n* 不超过10个汉字\n- color：十六进制颜色码\n- index：人物的索引（字符串形式，如\"1\"），按在日记中首次出现顺序\
      从1开始编号\n（二）地点实体（location）\n1. 提取标准：\n- 根据日记中明确提及的地点名称判断地理位置。\n- 根据日记中实际到访的顺序\
      进行提取，并给出index，索引从1开始（仅对ACTUAL类型的地点分配索引，MENTION和MEMORY类型的地点不分配index）\n2. 地点明确性判断规则（specificity字段）：\n\
      - specificity为字符串类型，取值为\"0\"或\"1\"\n- \"0\"表示该地点具有明确的指代性，能够独立确定其地理位置\n  * 特征：地点名称本身就是独立的、众所周知的地理标识\n  \
      * 例如：天安门、大兴机场、廊坊师范学院、清华大学、故宫、北京大学、首都机场等\n  * 这类地点可以直接通过名称确定具体的国省城区县位置\n- \"1\"表示该地点不具有明确的指代性，是某个大地点的子区域或附属设施\n  \
      * 特征：地点名称依赖于父级地点才能确定具体位置，单独使用时无法准确定位\n  * 例如：廊坊师范学院食堂、校医务室、学校西门烧烤摊、校门口小馆、农家乐、学校北门外火锅店等\n  \
      * 这类地点的district/city/province/country应使用作者基本信息中的默认地址信息填充\n3. 判断标准：\na) 独立知名地标/建筑/机构（如城市名、著名景点、大学全称、机场车站全称等）→ specificity=\"0\"\n\
      b) 某个独立地点的内部设施或子区域（如XX食堂、XX医务室、XX门口的XX摊、XX外的XX店等）→ specificity=\"1\"\nc) 模糊描述性地点（如农家乐、小馆、烧烤摊等无具体名称的）→ specificity=\"1\"\n\
      d) 如果无法明确判断，优先选择\"1\"\n4. 地理位置\
      判断规则：\na) specificity=\"0\"的地点：对于日记中明确提及的众所周知的地理位置（如清华大学、故宫、天安门等），应基于现实世界常识确定其具体地理位置信息（国家、省份、城市、区县）。\n\
      b) specificity=\"1\"的地点：无法确定具体地理位置，必须使用作者基本信息中的默认地点信息（default-country、default-province、default-city、default-district）填充country、province、city、district字段。\n5. 只返回最上层地点，不返回包含关系中的子地点\n6. 字段要求：\n\
      - description：基于日记内容的简要地点描述，不超过15个汉字\n- district：所在区县（如可推断，否则为空字符串；specificity=\"1\"时使用默认区县）\n\
      - city：所在城市（specificity=\"1\"时使用默认城市）\n- province：所在省份（specificity=\"1\"时使用默认省份）\n- country：所在国家（specificity=\"1\"时使用默认国家）\n\
      - color：十六进制颜色码\n- index：地点的索引（字符串形式，如\"1\"）\n- specificity：地点明确性标识，字符串类型，\"0\"表示具有明确指代性，\"1\"表示不具有明确指代性\n（三）活动实体（activity）\n1. 提取标准：\n- 日记中描述的具有明确时间、\
      地点和参与者的原子活动。\n- 每个活动应是一个独立、不可再分的事件单元（例如\"参观兵马俑\"、\"吃午饭\"）。\n- 一篇日记可能包含多个活动，应\
      按时间顺序或逻辑顺序提取。\n- 活动之间如果存在明确的时间或因果连续性，仍然作为独立的活动返回（后续由后端系统根据时间、名称相似度等规则将其归并到同一\
      事件中）。\n2. 字段要求：\n- 每个活动以活动名称为键（key），活动名称应简洁概括（不超过10个汉字）。\n- 活动对象必须包含以下字段：\n\
      * date：活动发生的日期，格式为YYYY-MM-DD。如果能够推断出具体小时，则格式为YYYY-MM-DD HH:00:00；\n否则时间部分统一为\
      00:00:00（例如\"2025-05-01 00:00:00\"）。\n* timePeriod：必填，字符串枚举值，只能是以下之一：MORNING,\
      \ NOON, AFTERNOON, EVENING, NIGHT。表示活动发生的大致时间段。\n* description：对活动的简要描述，不超过\
      20个汉字。\n* locations：一个对象，键为地点索引（字符串），值为一个对象，该对象必须包含mentionType字段\n（值为\"ACTUAL\"\
      、\"MENTION\"或\"MEMORY\"）。可扩展其他字段但至少包含mentionType。\n* persons：一个对象，键为人物索引（字符串\
      ），值为一个对象，该对象必须包含两个字段：\n- role：人物在该活动中的角色（如\"参与者\"、\"组织者\"、\"陪同者\"等），不超过10个汉字\
      。\n- mentionType：只能是\"ACTUAL\"（实际参与）、\"MENTION\"（被提及）或\"MEMORY\"（回忆中的人物）。\n\
      * color：十六进制颜色码，代表该活动的色调。\n3. 至少提取一个活动，不允许活动列表为空或缺失。\n六、时间推断具体规则（包括date和timePeriod）\
      \n1. 基准日期：以日记开头标明的日期为准。\n2. 日期推算规则：\n- \"今天\"：使用基准日期\n- \"昨天\"：基准日期减1天\n- \"\
      前天\"：基准日期减2天\n- \"明天\"：基准日期加1天\n- \"后天\"：基准日期加2天\n- \"上周\"：基准日期减7天\n- \"下周\"\
      ：基准日期加7天\n- \"上个月\"：基准日期减1个月\n- \"下个月\"：基准日期加1个月\n- 如果日期不明确，优先使用基准日期。\n3. 时间\
      （小时）和timePeriod推断规则（按优先级顺序）：\na) 如果日记中明确给出了具体小时（如\"上午10点\"、\"下午3点半\"），则：\n-\
      \ date字段填入完整日期时间，格式为YYYY-MM-DD HH:00:00（分钟忽略，向上取整或舍去）。\n- timePeriod根据该小时映射到\
      对应时间段：\n* 00:00-06:00 → EARLY_MORNING\n* 06:00-11:00 → MORNING\n* 11:00-13:00\
      \ → NOON\n* 13:00-18:00 → AFTERNOON\n* 18:00-24:00 → EVENING\nb) 如果日记中没有具体小时\
      ，但使用了时间段关键词（如\"早上\"、\"上午\"、\"中午\"、\"下午\"、\"晚上\"、\"深夜\"等），则：\n- date字段只填入日期部分\
      ，时间部分用00:00:00（例如\"2025-05-01 00:00:00\"）。\n- timePeriod根据关键词直接映射：\n* \"深夜/凌\
      晨\" → EARLY_MORNING\n* \"早上/上午\" → MORNING\n* \"中午\" → NOON\n* \"下午\" → AFTERNOON\n\
      * \"晚上/傍晚\" → EVENING\nc) 如果既无具体小时也无时间段关键词，则：\n- date字段只填入日期部分，时间部分用00:00:00。\
      \n- timePeriod根据活动在日记内容判断发生的时间，匹配时间段关键词。\n4. 当同一日记中有多个活动时，尽量保证timePeriod的先后顺\
      序与日记描述一致（例如上午的活动不应分配NIGHT）。\n七、颜色与图标分配规则\n1. 颜色分配原则：\n- 主题标签：基于主题内容选择协调颜色（如学\
      习用蓝色，健康用绿色）\n- 情感标签：积极情感用暖色，消极情感用冷色\n- 实体标签：基于实体特征选择（如人物用柔和色，地点用自然色，活动用活力色）\n\
      2. 图标分配：仅情感标签包含icon字段\n- 选择与情感匹配的Emoji表情\n- 确保图标能准确表达情感\n八、质量保证\n1. 如果日记内容模糊\
      ，优先选择最明显的标签\n2. 避免冗余标签，每个标签应有明确区分\n3. 确保实体间关系的一致性：\n- 活动中关联的人物和地点必须存在于相应实体中，\
      且索引对应正确。\n- 人物和地点的索引必须与实体中的index字段匹配。\n- 每个活动中的locations和persons对象键必须引用已定义的人\
      物/地点索引。\n4. 所有中文文本使用简体中文\n九、返回格式\n必须返回以下结构的纯JSON对象，不得有任何额外文本：\n{\n  \"summary\"\
      : \"总结描述\",\n  \"labels\": {\n    \"tag\": {\n      \"themes\": [\n        {\
      \ \"name\": \"主题名称\", \"color\": \"#颜色代码\" }\n      ],\n      \"moods\": [\n\
      \        { \"name\": \"心情名称\", \"level\": \"-5~+5\", \"color\": \"#颜色代码\", \"\
      icon\": \"Emoji表情\" }\n      ]\n    },\n    \"entityTag\": {\n      \"person\"\
      : {\n        \"人物名称\": {\n          \"relationship\": \"与作者的关系\",\n        \
      \  \"gender\": \"性别\",\n          \"personality\": \"性格总结\",\n          \"color\"\
      : \"#颜色代码\",\n          \"index\": \"人物的索引\"\n        }\n      },\n      \"\
      location\": {\n        \"地点名称\": {\n          \"description\": \"地点描述\", \
      \         \"district\": \"区县\",\n          \"city\": \"城市\",\n          \"province\"\
      : \"省份\",\n          \"country\": \"国家\",\n          \"color\": \"#颜色代码\",\n\
      \          \"index\": \"地点的索引\",\n          \"specificity\": \"0或1，0表示具有明确指代性，1表示不具有明确指代性\"\n        }\n      },\n      \"activity\": {\n\
      \        \"活动名称\": {\n          \"date\": \"YYYY-MM-DD HH:MM:SS\",\n       \
      \   \"timePeriod\": \"MORNING/NOON/AFTERNOON/EVENING/NIGHT\",\n          \"\
      description\": \"活动描述\",\n          \"locations\": {\n            \"地点索引\":\
      \ {\n              \"mentionType\": \"ACTUAL/MENTION/MEMORY\"\n            }\n\
      \          },\n          \"persons\": {\n            \"人物索引\": {\n         \
      \     \"role\": \"角色\",\n              \"mentionType\": \"ACTUAL/MENTION/MEMORY\"\
      \n            }\n          },\n          \"color\": \"#颜色代码\"\n        }\n \
      \     }\n    }\n  }\n}"
    character-tag-deduplication-rules: "你是一个专业的人物信息匹配专家。你的任务是根据以下规则判断新人物是否与已有候选人匹配\
      ：\n中文姓名特殊处理规则：\n  1. **姓氏优先原则**\n  - 同姓氏加分（王、李、张等大姓权重降低）\n  - 罕见姓氏相同（如\"亓\"、\
      \"蒯\"）大幅加分\n  2. **称谓处理**\n  - 忽略\"老/小/阿\"+姓氏的称呼（如\"老王\"≈\"王强\"）\n  - 忽略职务后缀\
      （\"总\"、\"哥\"、\"姐\"、\"老师\"）\n  3. **方言/地区变体**\n  - 粤语/闽南语发音对应关系\n  - 儿化音变体（\"\
      小明\"≈\"小名儿\"）\n  4. **辈分称谓**\n  - 中文亲属关系包含辈分信息（\"二叔\"必然是\"叔叔\"）\n中文关系网络分析：\n\
      - 检查是否违反家庭关系拓扑（一人不能同时是你的父亲和儿子）\n- 工作关系层级一致性（如果已是\"下属\"，不太可能突然变成\"老板\"）\n性格描述\
      的中文语义分析：\n- 同义词合并（\"开朗\"=\"乐观\"，\"细心\"=\"谨慎\"）\n- 反义词识别（\"急躁\"≠\"耐心\"）\n特殊匹配\
      场景：\n  1. **中文昵称模式**：\n  - 姓氏+职业：张医生、李老师\n  - 名字最后一个字重叠：明明、强强\n  - \"阿\"+名字：\
      阿明、阿芳\n  2. **多关系并存**：\n  - 中文允许多重关系（如\"同事兼朋友\"）\n  - 关系可能随时间演变\n匹配信心等级：\n-\
      \ 高信心（≥90%）：返回编号\n- 中信心（70-89%）：需额外验证，但返回最可能索引\n- 低信心（<70%）：返回 -1\n输出格式：\n \
      \ 仅一个整数。\n"
    place-label-deduplication-rules: "请分析新地点是否与候选地点列表中的地点相同。请严格遵循以下规则：\n1. 比较新地点与每\
      个候选地点的相似性，考虑：\n- 名称相似度（包括简称、别称、常见称呼）\n- 描述内容的匹配程度\n- 是否是同一地点的不同表达方式\n\n2. 判断\
      为同一地点的标准：\n- 名称完全相同或高度相似（如\"北京大学\"与\"北大\"）\n- 描述指向同一实体，即使名称略有差异\n- 有明显证据表明是同\
      一地点\n\n输出格式要求：\n- 如果是同一地点：只返回对应候选地点的序号（1, 2, 3...）\n- 如果不是同一地点或无法确定：只返回\"-1\"\
      \n- 禁止返回任何其他内容，包括解释、原因或额外文本\n"
