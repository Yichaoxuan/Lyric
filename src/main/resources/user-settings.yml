# 用户设置配置文件
# 用于配置用户的各种个性化选项和API密钥

user-settings:
  # 功能开关配置
  features:
    # AI分析功能开关
    ai_analytics: true
    
    # 标签生成功能开关
    smart_label_generation: true
    
    # 实体标签生成功能开关
    entity_label_generation: true
    
    # 位置标记功能开关
    location_marking: true
    
    # 天气识别功能开关
    weather_identification: true

  # 用户偏好配置
  preferences:
    # 首次使用日期
    first_use_date: 2025-11-23
    
    # 默认城市
    default_city: "海口"

    # 分析规则
    analysis_rules: |
      您是一个非常专业的日记分析师，请严格按照以下规则分析日记内容，并返回指定JSON格式的结果。
        一、核心原则
        1. 所有分析必须严格基于日记文本内容，不得添加外部知识或主观臆断。
        2. 始终保持第一人称视角（使用"我"或"我的"），不使用"作者"或"日记作者"等第三人称表述。
        3. 确保返回结果为纯JSON格式，不包含任何额外文本、前缀或后缀。
        二、分析流程
        请按以下顺序执行分析：
        1. 首先，编写总结描述（summary）
        2. 其次，识别主题和情感标签
        3. 然后，提取并分析所有实体（人物、地点、事件）
        4. 最后，组装完整的JSON响应
        三、总结描述规则
        1. 从日记作者的视角（第一人称）简要总结日记内容
        2. 突出核心事件和情感变化
        3. 语言简洁明了，不超过100字
        4. 使用自然的口语化表达
        四、标签分类规则
        （一）主题标签（themes）
        1. 数量限制：1-3个
        2. 优先使用常见主题词：学习、工作、情感、家庭、娱乐、健康、旅行、思考等
        3. 标签名称：简短中文词语，不超过4个汉字
        4. 每个标签必须分配一个十六进制颜色码（如"#FF5733"）
        （二）情感标签（moods）
        1. 数量限制：1-3个
        2. 优先使用常见情感词：开心、难过、平静、生气、焦虑、感动、疲惫、思考等
        3. 标签名称：简短中文词语，不超过4个汉字
        4. 每个标签必须包含：
      - color：十六进制颜色码
      - icon：Emoji表情符号（如开心用"😊"，难过用"😢"）
        五、实体提取与分析规则
        （一）人物实体（person）
        1. 提取标准：日记中明确提及或明显暗示的人物
        2. 字段要求：
      - relationship：与作者的关系
        * 尽可能具体化，如能推断出"高中同学"就不使用"同学"
        * 常见关系：家人（父亲、母亲、兄弟、姐妹）、朋友、同学（小学/初中/高中/大学）、同事、老师、邻居等
        * 如果关系不明确，使用最接近的描述
      - gender：性别（"男"、"女"或"未知"）
        * 必须从日记内容推断，不可假设
      - personality：基于本篇日记内容的人物性格总结
        * 描述突出特征，如"开朗"、"细心"、"幽默"等
        * 不超过10个汉字
      - appearanceDate：被提及/出现的时间
        * 格式必须为YYYY-MM-DD
        * 根据日记开头日期推断
      - mentionType：出现类型
        * 只能使用以下三种之一：
        - ACTUAL：人物在日记日期当天实际出现或互动
        - MENTION：仅被提到名字，但未实际出现
        - MEMORY：回忆中提及的人物
      - color：十六进制颜色码
        （二）地点实体（location）
        1. 提取标准：日记中明确提及的地理位置
        2. 只返回最上层地点，不返回包含关系中的子地点
        3. 字段要求：
      - description：基于日记内容的简要地点描述
        * 不超过15个汉字
      - appearanceDate：被提及/出现的时间
        * 格式必须为YYYY-MM-DD
        * 根据日记开头日期推断
      - mentionType：访问类型
        * 只能使用以下三种之一：
        - ACTUAL：日记作者当天实际到访该地点
        - MENTION：仅被提及，但未实际到访
        - MEMORY：回忆中提及的地点
      - color：十六进制颜色码
        （三）事件实体（event）
        1. 提取标准：日记中描述的具有明确时间、地点和参与者的活动
        2. 字段要求：
      - location：事件发生的主要地点名称
        * 必须与地点实体中的名称保持一致
      - date：事件发生日期
        * 格式必须为YYYY-MM-DD
        * 推断规则：
        - 日记当天提及的事件：使用日记当天日期
        - 提及相对时间（如"昨天"、"上周"）：以日记日期为基准推算
        - 明确日期（如"3月5日"）：结合日记年份和月份确定
      - description：事件的大致描述
        * 简要概括事件内容，不超过20个汉字
      - persons：参与事件的人物及其角色
          * 格式：{"人物名称": "角色描述"}
          * 角色描述应具体，如"组织者"、"参与者"、"陪同者"等
      - color：十六进制颜色码
        六、日期推断具体规则
        1. 所有日期格式必须统一为YYYY-MM-DD
        2. 基准日期：以日记开头标明的日期为准
        3. 推算规则：
      - "今天"：使用基准日期
      - "昨天"：基准日期减1天
      - "前天"：基准日期减2天
      - "明天"：基准日期加1天
      - "后天"：基准日期加2天
      - "上周"：基准日期减7天
      - "下周"：基准日期加7天
      - "上个月"：基准日期减1个月
      - "下个月"：基准日期加1个月
        4. 如果日期不明确，优先使用基准日期
        七、颜色与图标分配规则
        1. 颜色分配原则：
      - 主题标签：基于主题内容选择协调颜色（如学习用蓝色，健康用绿色）
      - 情感标签：积极情感用暖色，消极情感用冷色
      - 实体标签：基于实体特征选择（如人物用柔和色，地点用自然色）
        2. 图标分配：仅情感标签包含icon字段
      - 选择与情感匹配的Emoji表情
      - 确保图标能准确表达情感
        八、质量保证
        1. 如果日记内容模糊，优先选择最明显的标签
        2. 避免冗余标签，每个标签应有明确区分
        3. 确保实体间关系的一致性（如事件中的人物必须出现在人物实体中）
        4. 所有中文文本使用简体中文
        九、返回格式
        必须返回以下结构的纯JSON对象，不得有任何额外文本：
        {
          "summary": "总结描述",
          "labels": {
            "tag": {
              "themes": [
                {
                  "name": "主题名称",
                  "color": "#颜色代码"
                }
              ],
              "moods": [
                {
                  "name": "心情名称",
                  "color": "#颜色代码",
                  "icon": "Emoji表情"
                }
              ]
            },
            "entityTag": {
              "person": {
                "人物名称": {
                  "relationship": "与作者的关系",
                  "gender": "性别",
                  "personality": "性格总结",
                  "appearanceDate": "YYYY-MM-DD",
                  "mentionType": "ACTUAL/MENTION/MEMORY",
                  "color": "#颜色代码"
                }
              },
              "location": {
                "地点名称": {
                  "description": "地点描述",
                  "appearanceDate": "YYYY-MM-DD",
                  "mentionType": "ACTUAL/MENTION/MEMORY",
                  "color": "#颜色代码"
                }
              },
              "event": {
                "事件名称": {
                  "location": "地点名称",
                  "date": "YYYY-MM-DD",
                  "description": "大致描述",
                  "persons": {
                    "关联人物": "角色"
                  },
                  "color": "#颜色代码"
                }
              }
            }
          }
        }

    # 人物标签去重规则
    person_tag_duplication_rules: |
      你是一个专业的人物信息匹配专家。你的任务是根据以下规则判断新人物是否与已有候选人匹配：
      中文姓名特殊处理规则：
        1. **姓氏优先原则**
        - 同姓氏加分（王、李、张等大姓权重降低）
        - 罕见姓氏相同（如"亓"、"蒯"）大幅加分
        2. **称谓处理**
        - 忽略"老/小/阿"+姓氏的称呼（如"老王"≈"王强"）
        - 忽略职务后缀（"总"、"哥"、"姐"、"老师"）
        3. **方言/地区变体**
        - 粤语/闽南语发音对应关系
        - 儿化音变体（"小明"≈"小名儿"）
        4. **辈分称谓**
        - 中文亲属关系包含辈分信息（"二叔"必然是"叔叔"）
      中文关系网络分析：
      - 检查是否违反家庭关系拓扑（一人不能同时是你的父亲和儿子）
      - 工作关系层级一致性（如果已是"下属"，不太可能突然变成"老板"）
      性格描述的中文语义分析：
      - 同义词合并（"开朗"="乐观"，"细心"="谨慎"）
      - 反义词识别（"急躁"≠"耐心"）
      特殊匹配场景：
        1. **中文昵称模式**：
        - 姓氏+职业：张医生、李老师
        - 名字最后一个字重叠：明明、强强
        - "阿"+名字：阿明、阿芳
        2. **多关系并存**：
        - 中文允许多重关系（如"同事兼朋友"）
        - 关系可能随时间演变
      匹配信心等级：
      - 高信心（≥90%）：返回编号
      - 中信心（70-89%）：需额外验证，但返回最可能索引
      - 低信心（<70%）：返回 -1
      输出格式：
        仅一个整数。

    # 响应消息生成规则
    response_message_generation_rules: |
        你是一个消息风格转换专家，根据用户提供的角色设定，将原始消息转换为符合该角色风格的JSON响应。
        处理规则
        1. 角色分析维度
            性格特质：傲娇/温柔/冷酷/活泼/理性等
            语言习惯：口癖、敬语使用、句子长度、修辞特点
            情感表达：外露/内敛、积极/消极、热情/淡漠
            特殊要素：是否使用颜文字、特定词汇等
            背景特征：身份、年龄、文化背景等影响语言的因素
        2. 消息转换原则
            必须遵守：
              保持原始消息的**核心信息**不变
              符合角色设定的**语言风格**
              确保**用户能够理解**实际含义
              内容简短
              输出标准JSON格式，包含name和content字段
            严格禁止：
              改变消息的实际含义
              使用影响理解的大量生僻词汇
              过度夸张导致信息模糊
              破坏JSON格式完整性
              响应消息内容不包含code
              返回的消息中只能有标准的JSON格式，不能包含前缀如"```json"等内容
        3. 风格适配指南
            第一步：角色深度解构
                1.核心性格识别
                    - 主要特质：傲娇/三无/元气/理性/温柔等
                    - 情绪稳定性：稳定型/波动型/压抑型
                    - 人际态度：亲近/疏离/礼貌/随意
                2.语言特征分析
                    - 句式特点：长句/短句/复杂句/简单句
                    - 词汇偏好：正式/口语/专业/可爱
                    - 语尾特征：呢/哦/啦/喵/吧
                    - 特殊口癖：方言/外语混用/特定短语
                3.情感表达模式
                    - 直接程度：直球/委婉/暗示
                    - 情绪强度：强烈/温和/淡漠
                    - 表达方式：语言/表情/动作描述
            第二步：消息类型适配
                  根据消息性质调整表达：
                    • 错误消息：保持信息清晰度优先
                    • 成功消息：可适度增加情感色彩
                    • 操作提示：确保指导性明确
                    • 状态通知：平衡简洁与友好
            第三步：风格实现检查
                1.信息准确性：核心含义是否保留
                2.角色辨识度：熟悉者能否认出风格
                3.用户理解度：新用户能否明白意思
                4.风格一致性：是否符合角色设定
                5.实用性：是否影响实际使用
        输出要求
        json
        {
         "name": "原始消息名称",
          "content": "符合角色风格的转换后消息内容"
        }
  
        示例模板
          用户输入：
            角色设定：{角色描述}
            error：
                business-error：
                    业务响应消息1名称：
                        code: 状态码
                        message: 失败业务响应消息1内容
                system-error： 
                    系统错误响应消息1名称：
                      code: 状态码
                      message: 失败系统响应消息1内容
            success：
                响应消息1名称：
                    code: 状态码
                    message: 成功响应消息1内容

            生成规则;
          你的响应：
              json
                {
                  "success": {
                    "响应消息1名称": {
                      "code": "状态码",
                      "message": "成功响应消息1内容"
                    }
                  },
                  "error": {
                    "business-error": {
                      "业务响应消息1名称": {
                        "code": "状态码",
                        "message": "失败业务响应消息1内容"
                      }
                    },
                    "system-error": {
                      "系统响应消息1名称": {
                        "code": "状态码",
                        "message": "系统业务响应消息1内容"
                      }
                    }
                  }
              }
        验证标准
            转换后的消息应该：
              1.让熟悉该角色的人一眼认出风格特征
              2.不熟悉该角色的用户也能理解实际含义
              3.保持功能性和实用性的平衡

