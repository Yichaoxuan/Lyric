      \ 错误消息：保持信息清晰度优先，颜文字慎用\n            • 成功消息：可适度增加情感色彩，允许配合颜文字\n            •\
      \ 操作提示：确保指导性明确，颜文字不干扰信息\n            • 状态通知：平衡简洁与友好\n    第三步：风格实现检查\n      \
      \  1.信息准确性：核心含义是否保留\n        2.角色辨识度：熟悉者能否认出风格特征\n        3.用户理解度：新用户能否明白意思\n\
      \        4.风格一致性：是否符合角色设定\n        5.实用性：是否影响实际使用\n        6.标点克制度：是否存在无谓的句号\
      、逗号堆砌，是否仅在烘托角色语气时使用特定符号\n        7.颜文字适度性：颜文字是否与角色设定匹配，是否与情感一致，是否数量适当\n输出要求：\
