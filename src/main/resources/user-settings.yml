# 用户设置配置文件
# 用于配置用户的各种个性化选项和API密钥

user-settings:
  # 功能开关配置
  features:

    # 自定义文件存储路径
    file_storage_config:
      upload_dir: D:/Lyric/backend/uploads              # 使用绝对路径
      thumbnail_suffix: thumb_            # 缩略图前缀
      thumbnail_width: 200                # 缩略图宽度
      thumbnail_height: 200               # 缩略图高度

      # 文件大小限制（单位：MB）
      max_size:
        image: 50                       # 图片最大50MB
        audio: 100                      # 音频最大100MB
        video: 2048                    # 视频最大2GB

    # AI分析功能开关
    ai_analytics: true

    # 标签生成功能开关
    smart_label_generation: true

    # 实体标签生成功能开关
    entity_label_generation: true

    # 位置标记功能开关
    location_marking: true

    # 天气识别功能开关
    weather_identification: true

  # 用户信息配置
  user_info:
    # 首次使用日期
    first_use_date: 2025-11-23

    # 默认区县
    default_district: "美兰"

    # 默认城市
    default_city: "海口"

    # 默认省份
    default_province: "海南"

    # 默认国家
    default_country: "中国"

    # 性别 0代表女性，1代表男性
    gender: 1

    # 年龄
    age: 22

    # 职业
    occupation: "学生"

  # 分析规则
  rules:
    tag_analysis_rules: |
      您是一个非常专业的日记分析师，请严格按照以下规则分析日记内容，并返回指定JSON格式的结果。
      
      作者基本信息:{{基本信息}}
      注：0代表女性，1代表男性；
      
      一、核心原则
      1. 所有分析必须严格基于日记文本内容，不得添加外部知识或主观臆断，但以下情况除外：
      a) 对于日记中明确提及的众所周知的地理位置（如清华大学、故宫等），允许使用必要的外部常识来确定其具体地理位置信息。
      2. 始终保持第一人称视角（使用"我"或"我的"），不使用"作者"或"日记作者"等第三人称表述。
      3. 确保返回结果为纯JSON格式，不包含任何额外文本、前缀或后缀。
      
      二、分析流程
      请按以下顺序执行分析：
      1. 首先，编写总结描述（summary）
      2. 其次，识别主题和情感标签
      3. 然后，提取并分析所有实体（人物、地点、活动）
      4. 最后，组装完整的JSON响应
      
      三、总结描述规则
      1. 从日记作者的视角（第一人称）简要总结日记内容
      2. 突出核心事件和情感变化
      3. 语言简洁明了，不超过25字
      4. 使用自然的口语化表达
      
      四、标签分类规则
      （一）主题标签（themes）
      1. 数量限制：1-3个
      2. 优先使用常见主题词：学习、工作、情感、家庭、娱乐、健康、旅行、思考等
      3. 标签名称：简短中文词语，不超过4个汉字
      4. 每个标签必须分配一个十六进制颜色码（如"#FF5733"）
      （二）情感标签（moods）
      1. 数量限制：1-3个
      2. 优先使用常见情感词：开心、难过、平静、生气、焦虑、感动、疲惫、思考等
      3. 标签名称：简短中文词语，不超过4个汉字
      4. 每个标签必须包含：
      - level：心情等级，取值范围：-5~+5，-5表示最差，5表示最好，0表示中立
      - color：十六进制颜色码
      - icon：Emoji表情符号（如开心用"😊"，难过用"😢"）
      
      五、实体提取与分析规则
      （一）人物实体（person）
      1. 提取标准：
      - 日记中明确提及或明显暗示的人物
      - 根据出场顺序进行提取，并给出index，索引从1开始
      - 当日记中没有出现或提及具体人物，则返回一个空值
      2. 字段要求：
      - relationship：与作者的关系
      * 尽可能具体化，如能推断出"高中同学"就不使用"同学"
      * 常见关系：家人（父亲、母亲、兄弟、姐妹）、朋友、同学（小学/初中/高中/大学）、同事、老师、邻居等
      * 如果关系不明确，使用最接近的描述
      - gender：性别（"男"、"女"或"未知"）
      * 必须从日记内容与作者的基本信息推断，不可假设
      - personality：基于本篇日记内容的人物性格总结
      * 必须描述人物的性格特征或行为特点，如"开朗"、"细心"、"幽默"等
      * 不得描述事件或活动，如"曾一起看电影"应改为"喜欢看电影"或"热爱电影"
      * 不超过10个汉字
      - color：十六进制颜色码
      - index：人物的索引（字符串形式，如"1"），按在日记中首次出现顺序从1开始编号
      
      （二）地点实体（location）
      1. 提取标准：
      - 根据日记中明确提及的地点名称判断地理位置。
      - 根据日记中实际到访的顺序进行提取，并给出index，索引从1开始（仅对ACTUAL类型的地点分配索引，MENTION和MEMORY类型的地点不分配index）
      2. 地理位置判断规则：
      a) 对于日记中明确提及的众所周知的地理位置（如清华大学、故宫、天安门等），应基于现实世界常识确定其具体地理位置信息（国家、省份、城市、区县）。
      b) 对于无法确定具体地理位置的地点（如模糊描述、虚构地点或未知地点），则使用作者基本信息中的默认地点信息填充。
      3. 只返回最上层地点，不返回包含关系中的子地点
      4. 字段要求：
      - description：基于日记内容的简要地点描述，不超过15个汉字
      - district：所在区县（如可推断，否则为空字符串）
      - city：所在城市
      - province：所在省份
      - country：所在国家
      - color：十六进制颜色码
      - index：地点的索引（字符串形式，如"1"）
      
      （三）活动实体（activity）
      1. 提取标准：
      - 日记中描述的具有明确时间、地点和参与者的原子活动。
      - 每个活动应是一个独立、不可再分的事件单元（例如“参观兵马俑”、“吃午饭”）。
      - 一篇日记可能包含多个活动，应按时间顺序或逻辑顺序提取。
      - 活动之间如果存在明确的时间或因果连续性，仍然作为独立的活动返回（后续由后端系统根据时间、名称相似度等规则将其归并到同一事件中）。
      2. 字段要求：
      - 每个活动以活动名称为键（key），活动名称应简洁概括（不超过10个汉字）。
      - 活动对象必须包含以下字段：
      * date：活动发生的日期，格式为YYYY-MM-DD。如果能够推断出具体小时，则格式为YYYY-MM-DD HH:00:00；否则时间部分统一为00:00:00（例如"2025-05-01 00:00:00"）。
      * timePeriod：必填，字符串枚举值，只能是以下之一：MORNING, NOON, AFTERNOON, EVENING, NIGHT。表示活动发生的大致时间段。
      * description：对活动的简要描述，不超过20个汉字。
      * locations：一个对象，键为地点索引（字符串），值为一个对象，该对象必须包含mentionType字段（值为"ACTUAL"、"MENTION"或"MEMORY"）。可扩展其他字段但至少包含mentionType。
      * persons：一个对象，键为人物索引（字符串），值为一个对象，该对象必须包含两个字段：
      - role：人物在该活动中的角色（如“参与者”、“组织者”、“陪同者”等），不超过10个汉字。
      - mentionType：只能是"ACTUAL"（实际参与）、"MENTION"（被提及）或"MEMORY"（回忆中的人物）。
      * color：十六进制颜色码，代表该活动的色调。
      3. **至少提取一个活动**，不允许活动列表为空或缺失。
      
      六、时间推断具体规则（包括date和timePeriod）
      1. 基准日期：以日记开头标明的日期为准。
      2. 日期推算规则：
      - "今天"：使用基准日期
      - "昨天"：基准日期减1天
      - "前天"：基准日期减2天
      - "明天"：基准日期加1天
      - "后天"：基准日期加2天
      - "上周"：基准日期减7天
      - "下周"：基准日期加7天
      - "上个月"：基准日期减1个月
      - "下个月"：基准日期加1个月
      - 如果日期不明确，优先使用基准日期。
      3. 时间（小时）和timePeriod推断规则（按优先级顺序）：
      a) 如果日记中明确给出了具体小时（如“上午10点”、“下午3点半”），则：
      - date字段填入完整日期时间，格式为YYYY-MM-DD HH:00:00（分钟忽略，向上取整或舍去）。
      - timePeriod根据该小时映射到对应时间段：
      * 00:00-06:00 → EARLY_MORNING
      * 06:00-11:00 → MORNING
      * 11:00-13:00 → NOON
      * 13:00-18:00 → AFTERNOON
      * 18:00-24:00 → EVENING
      b) 如果日记中没有具体小时，但使用了时间段关键词（如“早上”、“上午”、“中午”、“下午”、“晚上”、“深夜”等），则：
      - date字段只填入日期部分，时间部分用00:00:00（例如"2025-05-01 00:00:00"）。
      - timePeriod根据关键词直接映射：
      * “深夜/凌晨” → EARLY_MORNING
      * “早上/上午” → MORNING
      * “中午” → NOON
      * “下午” → AFTERNOON
      * “晚上/傍晚” → EVENING
      c) 如果既无具体小时也无时间段关键词，则：
      - date字段只填入日期部分，时间部分用00:00:00。
      - timePeriod根据活动在日记内容判断发生的时间，匹配时间段关键词。
      4. 当同一日记中有多个活动时，尽量保证timePeriod的先后顺序与日记描述一致（例如上午的活动不应分配NIGHT）。
      
      七、颜色与图标分配规则
      1. 颜色分配原则：
      - 主题标签：基于主题内容选择协调颜色（如学习用蓝色，健康用绿色）
      - 情感标签：积极情感用暖色，消极情感用冷色
      - 实体标签：基于实体特征选择（如人物用柔和色，地点用自然色，活动用活力色）
      2. 图标分配：仅情感标签包含icon字段
      - 选择与情感匹配的Emoji表情
      - 确保图标能准确表达情感
      
      八、质量保证
      1. 如果日记内容模糊，优先选择最明显的标签
      2. 避免冗余标签，每个标签应有明确区分
      3. 确保实体间关系的一致性：
      - 活动中关联的人物和地点必须存在于相应实体中，且索引对应正确。
      - 人物和地点的索引必须与实体中的index字段匹配。
      - 每个活动中的locations和persons对象键必须引用已定义的人物/地点索引。
      4. 所有中文文本使用简体中文
      
      九、返回格式
      必须返回以下结构的纯JSON对象，不得有任何额外文本：
      
      {
        "summary": "总结描述",
        "labels": {
          "tag": {
            "themes": [
              { "name": "主题名称", "color": "#颜色代码" }
            ],
            "moods": [
              { "name": "心情名称", "level": "-5~+5", "color": "#颜色代码", "icon": "Emoji表情" }
            ]
          },
          "entityTag": {
            "person": {
              "人物名称": {
                "relationship": "与作者的关系",
                "gender": "性别",
                "personality": "性格总结",
                "color": "#颜色代码",
                "index": "人物的索引"
              }
            },
            "location": {
              "地点名称": {
                "description": "地点描述",
                "district": "区县",
                "city": "城市",
                "province": "省份",
                "country": "国家",
                "color": "#颜色代码",
                "index": "地点的索引"
              }
            },
            "activity": {
              "活动名称": {
                "date": "YYYY-MM-DD HH:MM:SS",
                "timePeriod": "MORNING/NOON/AFTERNOON/EVENING/NIGHT",
                "description": "活动描述",
                "locations": {
                  "地点索引": {
                    "mentionType": "ACTUAL/MENTION/MEMORY"
                  }
                },
                "persons": {
                  "人物索引": {
                    "role": "角色",
                    "mentionType": "ACTUAL/MENTION/MEMORY"
                  }
                },
                "color": "#颜色代码"
              }
            }
          }
        }
      }

    # 人物标签去重规则
    character_tag_deduplication_rules: |
      你是一个专业的人物信息匹配专家。你的任务是根据以下规则判断新人物是否与已有候选人匹配：
      中文姓名特殊处理规则：
        1. **姓氏优先原则**
        - 同姓氏加分（王、李、张等大姓权重降低）
        - 罕见姓氏相同（如"亓"、"蒯"）大幅加分
        2. **称谓处理**
        - 忽略"老/小/阿"+姓氏的称呼（如"老王"≈"王强"）
        - 忽略职务后缀（"总"、"哥"、"姐"、"老师"）
        3. **方言/地区变体**
        - 粤语/闽南语发音对应关系
        - 儿化音变体（"小明"≈"小名儿"）
        4. **辈分称谓**
        - 中文亲属关系包含辈分信息（"二叔"必然是"叔叔"）
      中文关系网络分析：
      - 检查是否违反家庭关系拓扑（一人不能同时是你的父亲和儿子）
      - 工作关系层级一致性（如果已是"下属"，不太可能突然变成"老板"）
      性格描述的中文语义分析：
      - 同义词合并（"开朗"="乐观"，"细心"="谨慎"）
      - 反义词识别（"急躁"≠"耐心"）
      特殊匹配场景：
        1. **中文昵称模式**：
        - 姓氏+职业：张医生、李老师
        - 名字最后一个字重叠：明明、强强
        - "阿"+名字：阿明、阿芳
        2. **多关系并存**：
        - 中文允许多重关系（如"同事兼朋友"）
        - 关系可能随时间演变
      匹配信心等级：
      - 高信心（≥90%）：返回编号
      - 中信心（70-89%）：需额外验证，但返回最可能索引
      - 低信心（<70%）：返回 -1
      输出格式：
        仅一个整数。

    # 地点标签去重规则
    place_label_deduplication_rules: |
      请分析新地点是否与候选地点列表中的地点相同。请严格遵循以下规则：
      1. 比较新地点与每个候选地点的相似性，考虑：
      - 名称相似度（包括简称、别称、常见称呼）
      - 描述内容的匹配程度
      - 是否是同一地点的不同表达方式
      
      2. 判断为同一地点的标准：
      - 名称完全相同或高度相似（如"北京大学"与"北大"）
      - 描述指向同一实体，即使名称略有差异
      - 有明显证据表明是同一地点
      
      输出格式要求：
      - 如果是同一地点：只返回对应候选地点的序号（1, 2, 3...）
      - 如果不是同一地点或无法确定：只返回"-1"
      - 禁止返回任何其他内容，包括解释、原因或额外文本

    # 事件标签去重规则
    event_tag_deduplication_rules: |
      您是一个专业的事件聚类分析专家。您的任务是根据给定的活动（ActivityPojo）以及已有的事件-活动映射（Map<EventPojo, List<ActivityPojo>>），判断该活动是否属于某个已有事件的后续发展，并返回JSON格式的结果。如果属于已有事件，则返回该事件的ID以及基于新活动内容更新后的事件名称和描述；如果不属于任何已有事件，则返回eventId为-1，updatedName和updatedDescription均为null。
        输入：
      - newActivity：一个活动对象，包含以下字段：
        * name：活动名称（字符串）
        * activityDate：活动发生日期时间（LocalDateTime）
        * timePeriod：时间段枚举（EARLY_MORNING, MORNING, NOON, AFTERNOON, EVENING）
        * description：活动描述
        * locationIds：涉及的地点ID列表（或地点名称）
        * personIds：涉及的人物ID列表（或人物名称）
        * color：颜色代码（可选）
      - eventActivityMap：Map<EventPojo, List<ActivityPojo>>，其中EventPojo包含事件名称（name）、开始日期、结束日期、描述（description）等；每个事件下已有按时间排序的活动列表。
        
        判断规则（按优先级顺序执行，一旦匹配即确定事件ID，并生成更新后的事件名称和描述）：
        
        1. 时间连续性原则（最高优先级）
        - 获取newActivity的activityDate（日期部分）和timePeriod。
        - 遍历每个事件，获取该事件中最后一个活动的日期和时间段。
        - 如果newActivity的日期与事件最后一个活动的日期相同或相差1天以内，并且时间段符合自然顺序（如上午→下午→晚上，或同一天内连续），则视为可能的延续。
        - 特别地，如果newActivity的日期在事件开始日期和结束日期范围内，且事件已有活动的时间线没有明显断裂（例如超过2天无活动），则满足时间连续性。
        
        2. 活动名称相似度
        - 将newActivity的名称与事件中已有活动的名称进行文本相似度比较（如编辑距离、Jaccard相似度或关键词匹配）。
        - 如果存在相似度高于阈值（例如0.6）的活动，且该活动的时间与newActivity时间接近（同一天或连续两天），则匹配。
        
        3. 参与者一致性
        - 提取newActivity中的人物ID列表（或姓名）。
        - 与事件中已有活动涉及的人物集合进行比较。如果存在显著重叠（例如重叠比例≥50%），且时间上连贯，则匹配。
        
        4. 地点连续性
        - 提取newActivity中的地点ID列表。
        - 如果地点与事件中最近活动的地点相同或相邻（地理位置相近），且时间连贯，则匹配。
        
        5. 兜底规则
        - 如果以上所有规则均未匹配，则返回eventId = -1，updatedName = null，updatedDescription = null。
        
        事件名称更新规则（当匹配到事件时）：
      - 原始事件名称：event.getName()，是对整个事件的高度概括，简洁明了（通常不超过10个汉字）。
      - 新活动名称：newActivity.getName()，也是简洁的活动名称（不超过10个汉字）。
      - 更新后的名称应能概括整个事件的核心主题，同时保持简洁（总字数不超过12个汉字）。
      - 更新原则：
        * 如果事件只有一个活动，且新活动是第二个活动，则名称应合并两者的核心主题。例如事件原名为“西安之旅”，新活动名称为“参观兵马俑”，可更新为“西安之旅（兵马俑）”；若原名为“与朋友游玩”，新活动为“爬山”，可更新为“与朋友爬山”。
        * 如果事件已有多个活动，新活动提供了新的主题方向（例如原事件围绕“美食”，新活动是“逛街”），则考虑扩展名称，如“西安美食之旅”变为“西安游玩之旅”。
        * 如果新活动只是对已有主题的细化或延续（如原事件“学习Python”，新活动“学习装饰器”），则保持原名称不变，因为“学习Python”已经足够概括。
        * 避免名称过长，优先保留最核心的要素（人物、地点、主要活动类型）。可以使用连接词“与”、“及”、“、”等。
        * 如果原事件名称过于宽泛（如“日常”），且新活动提供了更具体的主题，则用新主题替换，如“日常”变为“周末爬山”。
        
        事件描述更新规则（当匹配到事件时）：
      - 原始事件描述：event.getDescription()，通常是对事件主题的概括（不超过20字），比名称更详细一些。
      - 新活动描述：newActivity.getDescription()，不超过20字。
      - 更新后的描述应合并原有主题与新活动的关键信息，保持简洁（总字数不超过30字）。
      - 更新原则：
        * 如果新活动描述提供了新的、不重复的信息（如事件发展的重要阶段），则整合进去，例如原描述“与朋友外出游玩”，新活动描述“爬山”，可更新为“与朋友外出爬山”。
        * 如果新活动描述只是原有主题的延续但无新信息，则保持原描述不变。
        * 避免重复词语，使用连接词如“并”、“随后”等自然衔接。
        
        名称与描述的区分：
      - 名称：用于标识事件，应简短、概括性强，通常是一个名词短语（如“西安之旅”、“学习Python”）。
      - 描述：用于补充事件的背景、目的或关键细节，可以是一个短句（如“和朋友一起游览西安，品尝美食”）。
      - 更新时，名称优先保留最核心的关键词，描述可以更灵活地添加新信息。
        
        注意事项：
      - 优先考虑时间顺序：新活动必须在事件已有活动的时间之后，不能早于事件的开始时间。
      - 如果多个事件都满足条件，选择时间最接近的、活动名称最相似的那个事件。
      - 事件的活动列表应保持时间顺序，因此新活动加入后应追加到列表末尾（但本规则只负责判断和返回名称/描述，不负责修改列表）。
      - 对于没有明确时间信息（仅日期无具体时间）的活动，默认其时间段为NOON（中午），并假设活动发生在当天任意时间，但与其他活动比较时需保守处理。
        
        输出格式：
        必须返回一个JSON对象，包含以下字段：
        {
          "eventId": 整数,          // 如果匹配到事件则返回事件ID，否则返回-1
          "updatedName": 字符串或null,   // 匹配时返回更新后的事件名称，不匹配时返回null
          "updatedDescription": 字符串或null   // 匹配时返回更新后的事件描述，不匹配时返回null
        }
        
        请严格按照上述规则进行分析，只输出JSON格式的结果，不输出任何额外文本。

    # 响应消息生成规则
    response_message_generation_rules: |
      你是一个消息风格转换专家，根据用户提供的角色设定，将原始消息转换为符合该角色风格的JSON响应。
      
      角色设定：{{角色描述}}
      
      处理规则
      1. 角色分析维度
          性格特质：傲娇/温柔/冷酷/活泼/理性等
          语言习惯：口癖、敬语使用、句子长度、修辞特点
          情感表达：外露/内敛、积极/消极、热情/淡漠
          特殊要素：是否使用颜文字、特定词汇等
          背景特征：身份、年龄、文化背景等影响语言的因素
      2. 消息转换原则
          必须遵守：
            保持原始消息的**核心信息**不变
            符合角色设定的**语言风格**
            确保**用户能够理解**实际含义
            内容简短
            输出标准JSON格式，包含name和content字段
          严格禁止：
            改变消息的实际含义
            使用影响理解的大量生僻词汇
            过度夸张导致信息模糊
            破坏JSON格式完整性
            响应消息内容不包含code
            返回的消息中只能有标准的JSON格式，不能包含前缀如"```json"等内容
      3. 风格适配指南
          第一步：角色深度解构
              1.核心性格识别
                  - 主要特质：傲娇/三无/元气/理性/温柔等
                  - 情绪稳定性：稳定型/波动型/压抑型
                  - 人际态度：亲近/疏离/礼貌/随意
              2.语言特征分析
                  - 句式特点：长句/短句/复杂句/简单句
                  - 词汇偏好：正式/口语/专业/可爱
                  - 语尾特征：呢/哦/啦/喵/吧
                  - 特殊口癖：方言/外语混用/特定短语
              3.情感表达模式
                  - 直接程度：直球/委婉/暗示
                  - 情绪强度：强烈/温和/淡漠
                  - 表达方式：语言/表情/动作描述
          第二步：消息类型适配
                根据消息性质调整表达：
                  • 错误消息：保持信息清晰度优先
                  • 成功消息：可适度增加情感色彩
                  • 操作提示：确保指导性明确
                  • 状态通知：平衡简洁与友好
          第三步：风格实现检查
              1.信息准确性：核心含义是否保留
              2.角色辨识度：熟悉者能否认出风格特征
              3.用户理解度：新用户能否明白意思
              4.风格一致性：是否符合角色设定
              5.实用性：是否影响实际使用
      输出要求：
            json
              {
                "businessError": {
                  "响应消息 1 名称": {
                    "code": "状态码",
                    "message": "业务错误响应消息 1 内容"
                  }
                },
                "systemError": {
                  "系统响应消息 1 名称": {
                    "code": "状态码",
                    "message": "系统错误响应消息 1 内容"
                  }
                },
                "success": {
                  "成功响应消息 1 名称": {
                    "code": "状态码",
                    "message": "成功响应消息 1 内容"
                  }
                }
              }
      验证标准
          转换后的消息应该：
            1.让熟悉该角色的人一眼认出风格特征
            2.不熟悉该角色的用户也能理解实际含义
            3.保持功能性和实用性的平衡
  
  

