      /啦/喵/吧\n            - 特殊口癖：方言/外语混用/特定短语\n            - 标点偏好：分析角色是否依赖标点表达情绪（如\
      感叹号、问号、省略号、波浪号），以及常规叙述中是否使用句号。无特殊需求时，默认趋向于口语化的简洁表达（不加句末标点）。\n            - 颜\
